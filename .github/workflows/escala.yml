name: Bot da Masmorra

on:
  schedule:
    # Roda toda quarta-feira às 12:00 UTC (09:00 no horário de Brasília)
    - cron: '0 12 * * 3'
  workflow_dispatch: # Permite que você rode manualmente pelo site para testar

jobs:
  rodar-escala:
    runs-on: ubuntu-latest

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Executar script da faxina
      run: python3 Faxina_Masmorra.py